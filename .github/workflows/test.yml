name: test
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"  # every Monday at 8am UTC

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv run --extra dev ruff check .

  test:
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-jobs/using-a-matrix
        os: [ubuntu-latest, macos-latest, windows-latest]
        protoc: ["25.x", "34.x"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
        # https://github.com/actions/checkout
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
        # https://github.com/astral-sh/setup-uv
        # https://github.com/arduino/setup-protoc
      - uses: astral-sh/setup-uv@v7
      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ matrix.protoc }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: uv run --extra ci tox -e py310,py311,py312,py313,py314
      - run: ls -la coverage.xml || echo "coverage.xml not found"
      - uses: codecov/codecov-action@v5
        if: matrix.os == 'ubuntu-latest' && matrix.protoc == '25.x'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}